- slug: anak
  title: "Anak"
  tagline: "Psychological Horror • Folk-horror"
  status: complete
  description: >
    A couple are haunted by a silence at the center of their marriage. After years of infertility, something dark enters their home, drawn to the empty place inside. It knows her voice. It knows their secrets. It hungers. The story is about what happens when loss is left unspoken long enough to become a door.
  about: >
    _Anak_ means "child" in Filipino, but it carries deeper weight—referring not just
    to offspring, but to the bond that defines parent and child, the identity that
    comes with nurturing life.


    In this psychological horror, the absence of that bond becomes its own haunting
    presence. Set against the backdrop of modern fertility struggles, _Anak_ explores
    how desperation can transform love into something unrecognizable, and how the things
    we most desperately want can become the very things that destroy us.


    The story examines the shadow side of parenthood—not the joy of new life, but the
    consuming grief of its absence, and the lengths to which people will go to fill
    that void.

- slug: the-unnamed
  title: "The Unnamed"
  tagline: "Mountain Folk Horror • 8 Parts"
  status: complete
  description: >
    Gabriel returns to Baguio for his grandfather's wake, carrying the weight of
    years away and words left unspoken. In the mountain fog, old wounds refuse to
    heal, and some names are too dangerous to speak aloud.
  about: >
    Set in the mountain city of Baguio, Philippines, *The Unnamed* explores the
    weight of family secrets and the price of silence. In the Cordillera mountains,
    where fog rolls between ancient pines and tradition runs deeper than memory,
    some truths are too dangerous to name.


    This is a story about homecoming and haunting, about the things we bury and the
    ways they refuse to stay buried.

- slug: aswang
  title: "Aswang"
  tagline: "Philippine Folk Horror • 8 Parts"
  status: complete
  description: >
    Anna returns to her grandmother's village in the Philippines, carrying new life
    and old questions. The chapel still smells of incense, the novena chants still
    echo at night—and beyond the candlelight, something hungry waits, watching the
    womb it means to claim.
  about: >
    In Philippine folklore, the _aswang_ is a shapeshifting predator that preys on
    the unborn and the newly born. It wears the face of a friend, a neighbor, even a
    midwife, moving through the village by day and feeding in secret by night.


    Legends say it can split its body, slip through walls, and drink life from the
    womb. Some stories warn that it passes its curse to a chosen heir — an unholy
    inheritance given mouth-to-mouth.


    In Aswang, these ancient terrors survive into the present, where old prayers and
    older fears still hold power, and faith becomes both shield and battleground
    against the darkness.
